<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 다이어트 레시피</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuOS8A4kLGEcVZ2Sp2KEIem-YHV8m1nW0",
            authDomain: "recipe-85e0f.firebaseapp.com",
            projectId: "recipe-85e0f",
            storageBucket: "recipe-85e0f.appspot.com",
            messagingSenderId: "722700465513",
            appId: "1:722700465513:web:e83754d4e914c488afb9f8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 전역 변수 대신 DB 직접 조회
        window.db = db;
        window.collection = collection;

        // 화면 렌더링 시 DB에서 불러오기
        window.renderRecipes = async function() {
            const recipeList = document.getElementById('recipeList');
            const q = query(collection(db, "recipes"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            
            recipeList.innerHTML = '';
            querySnapshot.forEach((docSnap) => {
                const r = docSnap.data();
                const div = document.createElement('div');
                div.className = 'recipe-wrapper';
                div.innerHTML = `
                    <div class="recipe-card">
                        <div class="recipe-title">${r.title}</div>
                        <div class="recipe-creator">📺 ${r.creator || '작성자 없음'}</div>
                        <div class="recipe-ingredients">재료: ${r.ingredients}</div>
                        <div class="recipe-steps">${r.steps}</div>
                        <button class="heart-btn" onclick="addHeart('${docSnap.id}', ${r.hearts})">❤️ ${r.hearts || 0}회</button>
                    </div>
                `;
                recipeList.appendChild(div);
            });
        };

        // 데이터 저장
        window.handleFormSubmit = async function() {
            const title = document.getElementById('editTitle').value;
            await addDoc(collection(db, "recipes"), {
                title: title,
                creator: document.getElementById('editCreator').value,
                ingredients: document.getElementById('editIngredients').value,
                steps: document.getElementById('editSteps').value,
                hearts: 0,
                createdAt: Date.now()
            });
            alert("저장 완료!");
            location.reload();
        };

        window.addHeart = async function(id, currentHearts) {
            const docRef = doc(db, "recipes", id);
            await updateDoc(docRef, { hearts: increment(1) });
            renderRecipes();
        };

        window.onload = renderRecipes;
    </script>
    
    </head>
<body>
    </body>
</html>
