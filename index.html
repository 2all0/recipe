<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 다이어트 레시피</title>
    <style>
        :root { --primary-color: #4CAF50; --secondary-color: #2E7D32; --bg-color: #f9f9f9; --card-bg: #ffffff; --text-color: #333333; --danger-color: #ff4d4f; }
        body { background-color: var(--bg-color); padding: 20px; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        .container { width: 100%; max-width: 600px; }
        .recipe-card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .input-section { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
        .btn { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>다이어트 레시피</h1>
    <div class="input-section">
        <textarea id="bulkInput" placeholder="1. 요리명&#10;재료: ...&#10;방법: ...&#10;&#10;2. 요리명..."></textarea>
        <button class="btn" onclick="saveBulk()">등록 완료</button>
    </div>
    <div id="recipeList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyDuOS8A4kLGEcVZ2Sp2KEIem-YHV8m1nW0",
        projectId: "recipe-85e0f"
    }));

    // [핵심] 자동 분류 및 저장 함수
    window.saveBulk = async () => {
        const text = document.getElementById("bulkInput").value;
        // 1. 2. 3. 으로 시작하는 패턴을 찾아 블록별로 분리
        const recipes = text.split(/\n(?=\d+\.)/g);
        
        for(let r of recipes) {
            const lines = r.split('\n');
            const title = lines[0].replace(/^\d+\.\s*/, "").trim();
            const ingredients = lines.find(l => l.includes("재료:"))?.replace("재료:", "").trim() || "";
            const steps = lines.find(l => l.includes("방법:"))?.replace("방법:", "").trim() || "";
            
            await addDoc(collection(db, "recipes"), { title, ingredients, steps, createdAt: Date.now() });
        }
        alert("등록되었습니다!");
        loadRecipes();
    };

    async function loadRecipes() {
        const snap = await getDocs(query(collection(db, "recipes"), orderBy("createdAt", "desc")));
        const list = document.getElementById("recipeList");
        list.innerHTML = "";
        snap.forEach(d => {
            const r = d.data();
            list.innerHTML += `<div class="recipe-card">
                <h3>${r.title}</h3>
                <p>재료: ${r.ingredients}</p>
                <p>방법: ${r.steps}</p>
                <button onclick="deleteDoc(doc(db, 'recipes', '${d.id}')).then(loadRecipes)">삭제</button>
            </div>`;
        });
    }
    loadRecipes();
</script>
</body>
</html>
