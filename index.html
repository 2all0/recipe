<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 다이어트 레시피</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2E7D32;
            --bg-color: #f9f9f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --danger-color: #ff4d4f;
            --danger-hover: #d32f2f;
            --gray-btn: #757575;
            --blue-btn: #4a90e2;
            --green-btn: #50c878;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        .search-section { text-align: center; margin-top: 30px; margin-bottom: 25px; }
        .logo { font-size: 2rem; font-weight: bold; color: var(--primary-color); margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 15px 20px; font-size: 16px; border: 1px solid #dfe1e5; border-radius: 24px; outline: none; }
        .menu-buttons { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        .btn { flex: 1; padding: 12px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .btn-left { background-color: #e8f5e9; color: var(--secondary-color); }
        .btn-left.active { background-color: var(--secondary-color); color: white; }
        .btn-right { background-color: var(--primary-color); color: white; }
        
        .control-section { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; margin-bottom: 10px; width: 100%; flex-wrap: wrap; gap: 10px; }
        .edit-actions-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .control-btn { border: none; padding: 6px 10px; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; color: white; }
        .btn-mode-toggle { background-color: #e0e0e0; color: #333; }
        .btn-mode-toggle.active { background-color: var(--gray-btn); color: white; }
        .batch-delete-btn { background-color: var(--danger-color); }
        
        .recipe-list { margin-top: 10px; display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .recipe-wrapper { display: flex; align-items: flex-start; gap: 10px; width: 100%; }
        .recipe-checkbox { margin-top: 22px; width: 18px; height: 18px; cursor: pointer; display: none; }
        .recipe-wrapper.edit-mode .recipe-checkbox { display: block; }
        .recipe-card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eaeaea; flex: 1; }
        .recipe-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .recipe-creator { font-size: 12px; color: #777; background: #f1f1f1; padding: 2px 8px; border-radius: 4px; display: inline-block; }
        .recipe-ingredients { font-size: 14px; color: #666; background: #f5f5f5; padding: 10px; border-radius: 6px; margin: 10px 0; white-space: pre-line; }
        .recipe-steps { font-size: 14px; line-height: 1.5; white-space: pre-line; }
        .input-section { display: none; background: white; border-radius: 12px; padding: 20px; margin-top: 20px; border: 1px solid #ddd; }
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        .submit-btn { width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-section">
        <div class="logo">Diet Recipe</div>
        <input type="text" id="searchInput" placeholder="검색어 입력..." oninput="renderRecipes()" style="width:100%; padding:15px; border-radius:24px; border:1px solid #ccc;">
    </div>

    <div class="menu-buttons">
        <button class="btn btn-left" id="btnViewList" onclick="toggleView('list')">내 레시피</button>
        <button class="btn btn-right" onclick="openAddMode()">+ 추가하기</button>
    </div>

    <div class="control-section">
        <div class="edit-actions-group">
            <button class="control-btn btn-mode-toggle" id="modeToggleBtn" onclick="toggleEditMode()">편집</button>
            <button class="control-btn batch-delete-btn" id="batchDeleteBtn" onclick="deleteSelectedRecipes()" style="display: none;">삭제</button>
            <button class="control-btn" style="background:var(--blue-btn);" onclick="exportData()">내보내기</button>
            <button class="control-btn" style="background:var(--green-btn);" onclick="document.getElementById('fileInput').click()">불러오기</button>
            <input type="file" id="fileInput" style="display:none" onchange="importData(event)">
        </div>
    </div>

    <div class="input-section" id="inputSection">
        <h3 id="formTitle">레시피 등록</h3>
        <textarea id="bulkInput" placeholder="1. 요리이름&#10;재료: ...&#10;조리 방법: ..." style="width:100%; height:200px; margin:10px 0;"></textarea>
        <button class="submit-btn" onclick="saveBulkRecipes()">저장하기</button>
        <button onclick="toggleView('list')" style="width:100%; margin-top:10px; padding:10px; border:none; background:#eee;">취소</button>
    </div>

    <div class="recipe-list" id="recipeList"></div>
</div>

<script>
    let recipes = JSON.parse(localStorage.getItem('diet_recipes')) || [];
    let isEditMode = false;

    function renderRecipes() {
        const list = document.getElementById('recipeList');
        list.innerHTML = '';
        recipes.forEach((r, i) => {
            const wrapper = document.createElement('div');
            wrapper.className = `recipe-wrapper ${isEditMode ? 'edit-mode' : ''}`;
            wrapper.innerHTML = `
                <input type="checkbox" class="recipe-checkbox" data-id="${r.id}">
                <div class="recipe-card">
                    <div class="recipe-title">${r.title}</div>
                    <div class="recipe-creator">${r.creator || '작성자 없음'}</div>
                    <div class="recipe-ingredients">재료: ${r.ingredients}</div>
                    <div class="recipe-steps">${r.steps}</div>
                </div>
            `;
            list.appendChild(wrapper);
        });
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        document.getElementById('modeToggleBtn').innerText = isEditMode ? "완료" : "편집";
        document.getElementById('batchDeleteBtn').style.display = isEditMode ? 'block' : 'none';
        renderRecipes();
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(recipes));
        const a = document.createElement('a');
        a.setAttribute("href", dataStr);
        a.setAttribute("download", "my_recipes.json");
        a.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            recipes = JSON.parse(event.target.result);
            localStorage.setItem('diet_recipes', JSON.stringify(recipes));
            renderRecipes();
            alert("데이터를 성공적으로 불러왔습니다!");
        };
        reader.readAsText(e.target.files[0]);
    }

    function toggleView(mode) {
        document.getElementById('inputSection').style.display = mode === 'add' ? 'block' : 'none';
        document.getElementById('recipeList').style.display = mode === 'list' ? 'flex' : 'none';
        if(mode === 'list') renderRecipes();
    }

    function openAddMode() { toggleView('add'); }

    // (기존 레시피 저장 로직은 유지하시되 위 함수들만 추가/교체하세요)
    window.onload = renderRecipes;
</script>
</body>
</html>
