<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>나만의 레시피 보관함</title>
</head>
<body>
    <h1>맛있는 레시피를 적어보세요!</h1>
    
    <textarea id="myInput" rows="5" style="width:100%" placeholder="제목, 유튜버, 재료, 방법을 콤마(,)로 구분해서 적으세요. 예: 김치볶음밥, 백종원, 김치와 밥, 볶는다"></textarea>
    
    <br><br>
    <button onclick="saveMyRecipe()">저장하기</button>

    <script type="module">
        // 여기는 구글 창고와 연결하는 마법 주문이에요
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuOS8A4kLGEcVZ2Sp2KEIem-YHV8m1nW0",
            authDomain: "recipe-85e0f.firebaseapp.com",
            projectId: "recipe-85e0f",
            storageBucket: "recipe-85e0f.appspot.com",
            messagingSenderId: "722700465513",
            appId: "1:722700465513:web:e83754d4e914c488afb9f8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 버튼을 누르면 이 함수가 실행돼요
        window.saveMyRecipe = async () => {
            const text = document.getElementById("myInput").value;
            const parts = text.split(","); // 쉼표로 내용을 쪼개요

            await addDoc(collection(db, "recipes"), {
                title: parts[0],
                creator: parts[1],
                ingredients: parts[2],
                steps: parts[3]
            });
            alert("저장 성공!");
        };
    </script>
</body>
</html>
