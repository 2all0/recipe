<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 다이어트 레시피</title>
    <style>
        :root { --primary-color: #4CAF50; --bg-color: #f9f9f9; }
        body { background-color: var(--bg-color); padding: 20px; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        .container { width: 100%; max-width: 600px; }
        .recipe-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .input-section { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>다이어트 레시피</h1>
    <div class="input-section">
        <textarea id="bulkInput" placeholder="1. 김치볶음밥&#10;재료: 김치, 밥&#10;조리 방법: 볶는다"></textarea>
        <button onclick="saveAndRefresh()">등록하기</button>
    </div>
    <div id="recipeList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDuOS8A4kLGEcVZ2Sp2KEIem-YHV8m1nW0",
        authDomain: "recipe-85e0f.firebaseapp.com",
        projectId: "recipe-85e0f",
        storageBucket: "recipe-85e0f.appspot.com",
        messagingSenderId: "722700465513",
        appId: "1:722700465513:web:e83754d4e914c488afb9f8"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    // [1] 화면에 뿌려주는 함수
    window.renderRecipes = async () => {
        const list = document.getElementById('recipeList');
        const querySnapshot = await getDocs(query(collection(db, "recipes")));
        list.innerHTML = '';
        querySnapshot.forEach((doc) => {
            const r = doc.data();
            list.innerHTML += `<div class="recipe-card">
                <h3>${r.title || '제목 없음'}</h3>
                <p>재료: ${r.ingredients || '없음'}</p>
                <p>방법: ${r.steps || '없음'}</p>
            </div>`;
        });
    };

    // [2] 저장하고 바로 화면 갱신
    window.saveAndRefresh = async () => {
        const text = document.getElementById("bulkInput").value;
        // 아주 간단한 자동 분류 (제목, 재료, 방법 추출)
        await addDoc(collection(db, "recipes"), {
            title: text.split('\n')[0] || "이름없음",
            ingredients: "재료 확인 필요",
            steps: text
        });
        document.getElementById("bulkInput").value = '';
        renderRecipes(); // 저장 후 화면 다시 그리기
    };

    renderRecipes(); // 처음 접속할 때 한번 실행
</script>
</body>
</html>
