<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 다이어트 레시피</title>
    <style>
        /* 사용자님이 만드신 디자인 스타일 전체 */
        :root { --primary-color: #4CAF50; --secondary-color: #2E7D32; --bg-color: #f9f9f9; --card-bg: #ffffff; --text-color: #333333; --danger-color: #ff4d4f; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        .container { width: 100%; max-width: 600px; }
        .recipe-card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .input-section { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #ddd; }
        textarea { width: 100%; height: 200px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
        .btn { width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>나만의 다이어트 레시피</h1>
    <div class="input-section" id="inputSection">
        <textarea id="bulkInput" placeholder="1. 오이 샌드위치&#10;재료: 식빵, 오이, 참치&#10;방법: 오이를 썬다"></textarea>
        <button class="btn" onclick="handleFormSubmit()">등록 완료</button>
    </div>
    <div id="recipeList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDuOS8A4kLGEcVZ2Sp2KEIem-YHV8m1nW0",
        authDomain: "recipe-85e0f.firebaseapp.com",
        projectId: "recipe-85e0f",
        storageBucket: "recipe-85e0f.appspot.com",
        messagingSenderId: "722700465513",
        appId: "1:722700465513:web:e83754d4e914c488afb9f8"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    // 화면 그리기 함수
    window.renderRecipes = (recipes) => {
        const list = document.getElementById('recipeList');
        list.innerHTML = recipes.map(r => `
            <div class="recipe-card">
                <h3>${r.title}</h3>
                <p>재료: ${r.ingredients}</p>
                <p>방법: ${r.steps}</p>
                <button onclick="deleteRecipe('${r.id}')">삭제</button>
            </div>
        `).join('');
    };

    // 저장 및 분류 함수
    window.handleFormSubmit = async () => {
        const text = document.getElementById('bulkInput').value;
        const blocks = text.split(/\n(?=\d+\.)/g);
        for (const block of blocks) {
            const lines = block.split('\n');
            await addDoc(collection(db, "recipes"), {
                title: lines[0]?.replace(/^\d+\.\s*/, "") || "제목없음",
                ingredients: lines.find(l => l.includes('재료'))?.replace('재료:', '') || "확인필요",
                steps: lines.find(l => l.includes('방법'))?.replace('방법:', '') || "확인필요",
                createdAt: Date.now()
            });
        }
        alert("등록 완료!");
        document.getElementById('bulkInput').value = '';
        loadRecipes();
    };

    // 삭제 함수
    window.deleteRecipe = async (id) => {
        await deleteDoc(doc(db, "recipes", id));
        loadRecipes();
    };

    // 데이터 불러오기 함수
    async function loadRecipes() {
        const q = query(collection(db, "recipes"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        const recipes = [];
        snapshot.forEach(d => recipes.push({ id: d.id, ...d.data() }));
        renderRecipes(recipes);
    }

    loadRecipes();
</script>
</body>
</html>
